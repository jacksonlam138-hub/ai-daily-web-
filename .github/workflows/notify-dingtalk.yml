name: Notify DingTalk

# 在 Vercel 部署完成后触发，避免推送链接但新内容还没上线
# 也可以手动从 Actions 页面触发
on:
  workflow_run:
    workflows: ["Deploy to Vercel"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      date:
        description: '推送的日期 (YYYY-MM-DD，留空则用 store.ts 最新日期)'
        required: false

jobs:
  notify:
    runs-on: ubuntu-latest
    # 只在 deploy 成功时跑（失败时不打扰）
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: 判断是否为日报提交
        id: check
        run: |
          # workflow_dispatch 直接跑，workflow_run 时检查 commit message
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $MSG"
          if echo "$MSG" | grep -q "日报"; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "::notice::Skip: commit doesn't look like a daily report"
          fi

      - name: 提取推送日期
        if: steps.check.outputs.should_run == 'true'
        id: date
        run: |
          # 手动触发优先用 input
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.date }}" ]; then
            DATE="${{ github.event.inputs.date }}"
          else
            # 从 store.ts 找最新日期（第一条 date: 'YYYY-MM-DD'）
            DATE=$(grep -oE "date: '[0-9]{4}-[0-9]{2}-[0-9]{2}'" src/lib/store.ts | head -1 | grep -oE "[0-9]{4}-[0-9]{2}-[0-9]{2}")
          fi
          if [ -z "$DATE" ]; then
            echo "::error::No date found"
            exit 1
          fi
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "Target date: $DATE"

      - name: 触发钉钉推送
        if: steps.check.outputs.should_run == 'true'
        run: |
          echo "→ POST https://news.lamchung.top/api/post-dingtalk?date=${{ steps.date.outputs.date }}"
          RESPONSE=$(curl -sS -X POST \
            -H "Content-Type: application/json" \
            -d '{}' \
            "https://news.lamchung.top/api/post-dingtalk?date=${{ steps.date.outputs.date }}")
          echo "Response:"
          echo "$RESPONSE" | jq . 2>/dev/null || echo "$RESPONSE"

          if echo "$RESPONSE" | jq -e '.ok == true' > /dev/null 2>&1; then
            echo "::notice::Push succeeded for ${{ steps.date.outputs.date }}"
          else
            echo "::warning::Push did not succeed. Likely DINGTALK_WEBHOOK_URL not configured on Vercel yet."
            # 不 fail 整个 workflow——钉钉没配就跳过，不影响部署链
          fi
