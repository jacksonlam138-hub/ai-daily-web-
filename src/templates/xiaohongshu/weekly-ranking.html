<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1440px;
    background: #0a0908;
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
    color: #e8e0d4;
    overflow: hidden;
  }
  .card {
    width: 1080px;
    height: 1440px;
    padding: 72px 64px;
    display: flex;
    flex-direction: column;
    position: relative;
    background: linear-gradient(165deg, #0a0908 0%, #131110 40%, #1a1816 100%);
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.02;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    pointer-events: none;
  }
  .accent-bar {
    width: 48px;
    height: 3px;
    background: linear-gradient(90deg, #c8956c, transparent);
    border-radius: 2px;
    margin-bottom: 32px;
  }
  .header {
    margin-bottom: 16px;
  }
  .logo {
    font-family: "Instrument Serif", Georgia, serif;
    font-size: 52px;
    font-style: italic;
    color: #c8956c;
    letter-spacing: -0.02em;
    line-height: 1;
    margin-bottom: 8px;
  }
  .subtitle {
    font-size: 18px;
    color: #9a8e7e;
  }
  .divider {
    height: 1px;
    background: linear-gradient(90deg, #2a2520, transparent);
    margin: 28px 0;
  }
  .ranking-list {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .rank-item {
    display: flex;
    gap: 20px;
    align-items: center;
  }
  .rank-number {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 700;
    font-family: "SF Mono", monospace;
    flex-shrink: 0;
  }
  .rank-1 { background: rgba(200,149,108,0.15); color: #c8956c; border: 1px solid rgba(200,149,108,0.25); }
  .rank-2 { background: rgba(200,149,108,0.10); color: #dba87f; border: 1px solid rgba(200,149,108,0.15); }
  .rank-3 { background: rgba(200,149,108,0.06); color: #c8956c; border: 1px solid rgba(200,149,108,0.1); }
  .rank-4, .rank-5 { background: rgba(255,255,255,0.03); color: #6a6054; border: 1px solid #2a2520; }
  .rank-content {
    flex: 1;
    min-width: 0;
  }
  .rank-title {
    font-size: 20px;
    font-weight: 500;
    line-height: 1.35;
    color: #e8e0d4;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .rank-meta {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .rank-source {
    font-size: 13px;
    color: #9a8e7e;
  }
  .rank-score-bar {
    flex: 1;
    max-width: 200px;
    height: 4px;
    background: rgba(255,255,255,0.04);
    border-radius: 2px;
    overflow: hidden;
  }
  .rank-score-fill {
    height: 100%;
    border-radius: 2px;
    background: #c8956c;
    opacity: 0.7;
  }
  .rank-score-num {
    font-size: 13px;
    font-family: "SF Mono", monospace;
    color: #6a6054;
  }
  .footer {
    margin-top: 32px;
    padding-top: 32px;
    border-top: 1px solid #2a2520;
    text-align: center;
  }
  .cta {
    font-size: 20px;
    color: #9a8e7e;
    letter-spacing: 0.05em;
  }
  .cta-highlight {
    color: #c8956c;
    font-weight: 600;
  }
  .bottom-tags {
    margin-top: 12px;
    font-size: 14px;
    color: #6a6054;
    letter-spacing: 0.08em;
  }
</style>
</head>
<body>
<div class="card">
  <div class="accent-bar"></div>

  <div class="header">
    <div class="logo">Weekly Top 5</div>
    <div class="subtitle">本周 AI 大事排行</div>
  </div>

  <div class="divider"></div>

  <div class="ranking-list">
    <!-- Rank 1 -->
    <div class="rank-item">
      <div class="rank-number rank-1">01</div>
      <div class="rank-content">
        <div class="rank-title">{{TITLE_1}}</div>
        <div class="rank-meta">
          <span class="rank-source">{{SOURCE_1}}</span>
          <div class="rank-score-bar"><div class="rank-score-fill" style="width:{{SCORE_PCT_1}}%"></div></div>
          <span class="rank-score-num">{{SCORE_1}}</span>
        </div>
      </div>
    </div>

    <!-- Rank 2 -->
    <div class="rank-item">
      <div class="rank-number rank-2">02</div>
      <div class="rank-content">
        <div class="rank-title">{{TITLE_2}}</div>
        <div class="rank-meta">
          <span class="rank-source">{{SOURCE_2}}</span>
          <div class="rank-score-bar"><div class="rank-score-fill" style="width:{{SCORE_PCT_2}}%"></div></div>
          <span class="rank-score-num">{{SCORE_2}}</span>
        </div>
      </div>
    </div>

    <!-- Rank 3 -->
    <div class="rank-item">
      <div class="rank-number rank-3">03</div>
      <div class="rank-content">
        <div class="rank-title">{{TITLE_3}}</div>
        <div class="rank-meta">
          <span class="rank-source">{{SOURCE_3}}</span>
          <div class="rank-score-bar"><div class="rank-score-fill" style="width:{{SCORE_PCT_3}}%"></div></div>
          <span class="rank-score-num">{{SCORE_3}}</span>
        </div>
      </div>
    </div>

    <!-- Rank 4 -->
    <div class="rank-item">
      <div class="rank-number rank-4">04</div>
      <div class="rank-content">
        <div class="rank-title">{{TITLE_4}}</div>
        <div class="rank-meta">
          <span class="rank-source">{{SOURCE_4}}</span>
          <div class="rank-score-bar"><div class="rank-score-fill" style="width:{{SCORE_PCT_4}}%"></div></div>
          <span class="rank-score-num">{{SCORE_4}}</span>
        </div>
      </div>
    </div>

    <!-- Rank 5 -->
    <div class="rank-item">
      <div class="rank-number rank-5">05</div>
      <div class="rank-content">
        <div class="rank-title">{{TITLE_5}}</div>
        <div class="rank-meta">
          <span class="rank-source">{{SOURCE_5}}</span>
          <div class="rank-score-bar"><div class="rank-score-fill" style="width:{{SCORE_PCT_5}}%"></div></div>
          <span class="rank-score-num">{{SCORE_5}}</span>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="cta"><span class="cta-highlight">关注我</span> · 每天3分钟看懂AI</div>
    <div class="bottom-tags">#AI日报 #人工智能 #PM视角 #本周精选</div>
  </div>
</div>
</body>
</html>
